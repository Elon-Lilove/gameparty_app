app = "party-games-mahjong-sync"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  DATABASE_PATH = "/data/mahjong.sqlite"

[[mounts]]
  source = "mahjong_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8787
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/health"
